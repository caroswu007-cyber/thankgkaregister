name: Supabase Keepalive

on:
  schedule:
    # Run every three days at 03:17 UTC to keep the free Supabase project active.
    - cron: "17 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase RPC
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY GitHub repository secret."
            exit 1
          fi

      - name: Call lightweight query RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl --fail --show-error --silent \
            --request POST "$SUPABASE_URL/rest/v1/rpc/query_registration_status" \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Content-Type: application/json" \
            --data '{"q_name":"__keepalive__","q_id_last6":"000000"}' \
            --output /tmp/supabase-keepalive.json

          echo "Supabase keepalive completed."
