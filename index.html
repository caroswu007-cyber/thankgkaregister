<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="唐卡传承公益体验课 — 菩提画院" />
  <title>菩提画院 · 唐卡传承公益体验课</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&family=Noto+Serif+Tibetan:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body class="page-home-grand page-home-minimal">
  <a class="skip-link" href="#main">跳到主要内容</a>

  <header class="site-header site-header--grand">
    <div class="header-inner">
      <a class="brand-mark" href="index.html" aria-label="菩提画院首页">
        <img src="images/putihuayuan-logo.png" alt="" width="40" height="40" />
        <span><strong>菩提画院</strong></span>
      </a>
      <nav class="site-nav site-nav--grand" aria-label="主导航">
        <a href="index.html" aria-current="page">首页</a>
        <a href="register.html">课程报名</a>
        <a href="query.html">查询</a>
      </nav>
    </div>
  </header>

  <main id="main" class="home-grand home-grand--minimal">
    <section class="grand-hero grand-hero--logo-only" aria-label="菩提画院">
      <div class="grand-atmosphere" aria-hidden="true">
        <div class="grand-atmosphere__sky"></div>
        <div class="grand-atmosphere__mountains"></div>
        <p class="grand-atmosphere__tibetan" lang="bo">ཨོཾ་མ་ཎི་པདྨེ་ཧཱུྃ</p>
      </div>

      <div class="grand-hero__inner">
        <div class="grand-logo-ring grand-logo-ring--hero" aria-hidden="true">
          <img src="images/putihuayuan-logo.png" alt="菩提画院" width="200" height="200" loading="eager" />
        </div>
        <p class="grand-brand-name">菩提画院</p>
        <a id="btn-register" class="btn btn-primary btn-grand-primary" href="register.html">课程报名</a>
      </div>
    </section>

    <section id="about-us" class="grand-about" aria-labelledby="about-title">
      <p class="grand-section-kicker" lang="bo">ངོ་སྤྲོད</p>
      <h2 id="about-title" class="grand-section-title">关于我们</h2>

      <div class="grand-about-card">
        <figure class="teacher-poster">
          <img
            src="images/teacher-poster.png"
            alt="唐卡公益绘画体验课海报，含课程信息与报名二维码"
            width="288"
            height="576"
            loading="lazy"
          />
        </figure>
        <div class="contact-copy teacher-copy">
          <h3>唐卡公益绘画体验课</h3>
          <p>请长按或右键保存海报图片，再打开微信识别 / 扫描海报右下角二维码报名。</p>
          <p class="teacher-copy-note">名额有限，报名后请留意邮箱通知；已报名学员可继续查询报名状态。</p>
          <a class="btn btn-secondary" href="query.html">已报名？学员查询</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer site-footer--grand">
    <p>唐卡传承公益体验课 · 菩提画院</p>
  </footer>

  <script src="js/site.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.TangkaSite) TangkaSite.bindIndexPage();
    });
  </script>
</body>
</html>
