<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="唐卡课学员报名状态自助查询" />
  <title>学员查询 · 唐卡传承公益体验课</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body class="page-query">
  <a class="skip-link" href="#main">跳到主要内容</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand-mark" href="index.html" aria-label="菩提画院首页">
        <img src="images/putihuayuan-logo.png" alt="" width="44" height="44" />
        <span>
          <strong>菩提画院</strong>
          <small>唐卡传承公益体验课</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="register.html">课程报名</a>
        <a href="query.html" aria-current="page">学员查询</a>
        <a href="about.html">关于我们</a>
      </nav>
    </div>
  </header>

  <main id="main" class="main-wrap main-wrap--form main-wrap--wide">
    <header class="page-strip form-page-header">
      <h1 class="form-page-title">学员查询</h1>
      <p class="form-page-lead">请输入报名时登记的<strong>姓名</strong>、<strong>证件类型</strong>与<strong>证件号码后 6 位</strong>，查询本期课程报名状态。</p>
    </header>

    <form id="query-form" class="register-form" novalidate>
      <div class="form-section">
        <h2 class="form-section-title">查询条件</h2>
        <div class="form-field">
          <label class="form-label" for="q-name">姓名</label>
          <input class="form-input" type="text" id="q-name" name="name" autocomplete="name" maxlength="40" />
        </div>
        <div class="form-field-group">
          <div class="form-field">
            <label class="form-label" for="q-id-type">证件类型</label>
            <select class="form-input" id="q-id-type" name="id_type">
              <option value="身份证">身份证</option>
              <option value="护照">护照</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label" for="q-last6">证件号码后 6 位</label>
            <input class="form-input" type="text" id="q-last6" name="id_last6" maxlength="6" placeholder="身份证填 6 位数字；护照/其他填后 6 位" />
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="q-submit" class="btn btn-primary">查询</button>
        <a class="btn btn-secondary" href="index.html">返回首页</a>
        <a class="btn btn-secondary" href="admin.html">管理员后台</a>
      </div>
    </form>

    <div id="query-error" class="alert-panel alert-panel--error" role="alert" hidden></div>

    <section id="query-empty" class="result-card result-card--muted" hidden>
      <h2 class="result-card-title">未找到记录</h2>
      <p>请核对姓名、证件类型与证件号码后六位是否一致；若刚完成报名，可能尚未录入数据，请稍后再查或联系工作人员。</p>
    </section>

    <section id="query-results" class="result-stack" hidden>
      <h2 class="section-title">查询结果</h2>
      <div class="result-card">
        <div class="result-head">
          <span class="result-name" id="res-name">—</span>
          <span class="status-pill" id="res-status">—</span>
        </div>
        <dl class="result-dl">
          <div class="result-dl-row">
            <dt>本期课程</dt>
            <dd id="res-current-course">—</dd>
          </div>
          <div class="result-dl-row">
            <dt>历史参课次数</dt>
            <dd><span id="res-count">0</span> 期</dd>
          </div>
          <div class="result-dl-row result-dl-row--block">
            <dt>历史参课记录</dt>
            <dd id="res-history">—</dd>
          </div>
          <div class="result-dl-row">
            <dt>登记手机</dt>
            <dd id="res-phone">—</dd>
          </div>
          <div class="result-dl-row">
            <dt>微信号</dt>
            <dd id="res-wechat">—</dd>
          </div>
        </dl>
        <p class="result-footnote">完整证件号码与哈希不在此展示；如需更正资料请联系管理员。</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>唐卡传承公益体验课 · 菩提画院</p>
  </footer>

  <script src="js/site.js"></script>
  <script src="js/sync-config.js"></script>
  <script src="js/query-config.js"></script>
  <script src="js/query.js"></script>
</body>
</html>
